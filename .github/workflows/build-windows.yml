name: Windows Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the installer'
        required: false
        default: '0.2.0'

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version || '0.2.0' }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install system dependencies
        shell: pwsh
        run: |
          choco install innosetup -y

          $runtimeDir = "packaging/runtime/mpv/windows"
          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          Remove-Item "$runtimeDir/*.dll" -Force -ErrorAction SilentlyContinue

          Invoke-WebRequest `
            -Uri "https://sourceforge.net/projects/mpv-player-windows/files/libmpv/mpv-dev-x86_64-latest.7z/download" `
            -OutFile "mpv.7z"

          7z x "mpv.7z" "-otmp\\mpv" | Out-Null

          $mpvDll = Get-ChildItem -Path "tmp/mpv" -Recurse -Filter "mpv-2.dll" | Select-Object -First 1
          if (-not $mpvDll) {
            throw "mpv-2.dll not found in extracted archive"
          }

          $dllDir = $mpvDll.Directory.FullName
          Get-ChildItem -Path $dllDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination $runtimeDir -Force
          }

          if (-not (Test-Path "$runtimeDir/mpv-2.dll")) {
            throw "Failed to stage mpv-2.dll"
          }

      - name: Install dependencies
        run: pip install -r requirements-core.txt pyinstaller

      - name: Build with PyInstaller
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: pyinstaller packaging/windows/scene_ripper.spec --distpath dist --workpath build --noconfirm

      - name: Verify PyInstaller output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/Scene Ripper/Scene Ripper.exe")) {
            throw "PyInstaller executable missing"
          }
          if (-not (Test-Path "dist/Scene Ripper/mpv-2.dll")) {
            throw "Bundled mpv-2.dll missing from dist output"
          }

      - name: Build Inno Setup installer
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: iscc packaging/windows/scene_ripper.iss

      - name: Verify installer output
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "packaging/windows/Output" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer was not created"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SceneRipper-Windows-Installer
          path: packaging/windows/Output/*.exe

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: SceneRipper-Windows-App
          path: dist/Scene Ripper

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/windows/Output/*.exe
