name: Windows Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the installer'
        required: false
        default: '0.2.0'

env:
  PYTHON_VERSION: '3.11'
  WINSPARKLE_VERSION: '0.9.2'
  UPDATE_FEED_TAG: 'update-feed'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version || '0.2.0' }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies and stage runtimes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          choco install innosetup -y

          $mpvRuntimeDir = "packaging/runtime/mpv/windows"
          New-Item -ItemType Directory -Force -Path $mpvRuntimeDir | Out-Null
          Remove-Item "$mpvRuntimeDir/*.dll" -Force -ErrorAction SilentlyContinue
          Remove-Item "tmp/mpv" -Recurse -Force -ErrorAction SilentlyContinue

          $releaseHeaders = @{
            "User-Agent" = "Scene-Ripper-Build"
            "Authorization" = "Bearer $env:GH_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $mpvRelease = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" `
            -Headers $releaseHeaders

          $mpvAsset = $mpvRelease.assets | Where-Object { $_.name -like "mpv-dev-x86_64-*.7z" } | Select-Object -First 1
          if (-not $mpvAsset) {
            throw "Could not find a matching mpv development archive in the latest release"
          }

          Invoke-WebRequest -Uri $mpvAsset.browser_download_url -OutFile "mpv.7z"
          7z x "mpv.7z" "-otmp\\mpv" | Out-Null

          $mpvDll = Get-ChildItem -Path "tmp/mpv" -Recurse -Include "mpv-2.dll","libmpv-2.dll","mpv-1.dll" | Select-Object -First 1
          if (-not $mpvDll) {
            throw "No supported mpv runtime DLL found in extracted archive"
          }

          $dllDir = $mpvDll.Directory.FullName
          Get-ChildItem -Path $dllDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination $mpvRuntimeDir -Force
          }

          $stagedMpvDll = Get-ChildItem -Path $mpvRuntimeDir -File | Where-Object {
            $_.Name -in @("mpv-2.dll", "libmpv-2.dll", "mpv-1.dll")
          } | Select-Object -First 1
          if (-not $stagedMpvDll) {
            throw "Failed to stage an mpv runtime DLL"
          }

          $winSparkleRuntimeDir = "packaging/runtime/winsparkle/windows"
          $winSparkleToolsDir = Join-Path $winSparkleRuntimeDir "tools"
          New-Item -ItemType Directory -Force -Path $winSparkleToolsDir | Out-Null
          Remove-Item "$winSparkleRuntimeDir/*.dll" -Force -ErrorAction SilentlyContinue
          Remove-Item "$winSparkleToolsDir/*" -Force -ErrorAction SilentlyContinue
          Remove-Item "tmp/winsparkle" -Recurse -Force -ErrorAction SilentlyContinue

          $winSparkleVersion = "${{ env.WINSPARKLE_VERSION }}"
          $winSparkleAssetUrl = "https://github.com/vslavik/winsparkle/releases/download/v$winSparkleVersion/WinSparkle-$winSparkleVersion.zip"
          Invoke-WebRequest -Uri $winSparkleAssetUrl -OutFile "winsparkle.zip"
          Expand-Archive -Path "winsparkle.zip" -DestinationPath "tmp/winsparkle" -Force

          $dllCandidates = Get-ChildItem -Path "tmp/winsparkle" -Recurse -Filter "WinSparkle.dll"
          $winSparkleDll = $dllCandidates | Where-Object { $_.FullName -match '(?i)(x64|amd64)' } | Select-Object -First 1
          if (-not $winSparkleDll) {
            $winSparkleDll = $dllCandidates | Select-Object -First 1
          }
          if (-not $winSparkleDll) {
            throw "Failed to locate WinSparkle.dll in extracted release assets"
          }

          $winSparkleTool = Get-ChildItem -Path "tmp/winsparkle" -Recurse -Filter "winsparkle-tool.exe" | Select-Object -First 1
          if (-not $winSparkleTool) {
            throw "Failed to locate winsparkle-tool.exe in extracted release assets"
          }

          Copy-Item $winSparkleDll.FullName -Destination $winSparkleRuntimeDir -Force
          Copy-Item $winSparkleTool.FullName -Destination $winSparkleToolsDir -Force

      - name: Install dependencies
        run: pip install -r requirements-core.txt pyinstaller

      - name: Build with PyInstaller
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_BUILD_VERSION: ${{ steps.version.outputs.version }}
          WINSPARKLE_APPCAST_URL: https://github.com/${{ github.repository }}/releases/download/${{ env.UPDATE_FEED_TAG }}/appcast-windows.xml
          WINSPARKLE_PUBLIC_ED_KEY: ${{ secrets.UPDATE_PUBLIC_ED_KEY }}
        run: pyinstaller packaging/windows/scene_ripper.spec --distpath dist --workpath build --noconfirm

      - name: Verify PyInstaller output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/Scene Ripper/Scene Ripper.exe")) {
            throw "PyInstaller executable missing"
          }
          $bundledMpvDll = Get-ChildItem -Path "dist/Scene Ripper" -Recurse -File | Where-Object {
            $_.Name -in @("mpv-2.dll", "libmpv-2.dll", "mpv-1.dll")
          } | Select-Object -First 1
          if (-not $bundledMpvDll) {
            throw "Bundled mpv runtime DLL missing from dist output"
          }
          $bundledWinSparkleDll = Get-ChildItem -Path "dist/Scene Ripper" -Recurse -File | Where-Object {
            $_.Name -eq "WinSparkle.dll"
          } | Select-Object -First 1
          if (-not $bundledWinSparkleDll) {
            throw "Bundled WinSparkle.dll missing from dist output"
          }

      - name: Smoke test frozen app startup
        shell: pwsh
        run: |
          $smokeArtifactsDir = Join-Path $PWD "smoke-test-artifacts"
          $smokeLocalAppData = Join-Path $smokeArtifactsDir "localappdata"
          New-Item -ItemType Directory -Force -Path $smokeLocalAppData | Out-Null

          $stdoutLog = Join-Path $smokeArtifactsDir "stdout.log"
          $stderrLog = Join-Path $smokeArtifactsDir "stderr.log"
          $appLog = Join-Path $smokeLocalAppData "Scene Ripper/logs/scene-ripper.log"

          $env:SCENE_RIPPER_STARTUP_SMOKE_TEST = "1"
          $env:LOCALAPPDATA = $smokeLocalAppData
          $appPath = "dist/Scene Ripper/Scene Ripper.exe"
          $process = Start-Process `
            -FilePath $appPath `
            -PassThru `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError $stderrLog

          function Show-SmokeDiagnostics {
            if (Test-Path $stdoutLog) {
              Write-Host "=== Smoke test stdout ==="
              Get-Content $stdoutLog -Tail 200
            }

            if (Test-Path $stderrLog) {
              Write-Host "=== Smoke test stderr ==="
              Get-Content $stderrLog -Tail 200
            }

            if (Test-Path $appLog) {
              Write-Host "=== Scene Ripper app log ==="
              Get-Content $appLog -Tail 300
            } else {
              Write-Host "Scene Ripper app log not found at $appLog"
            }
          }

          try {
            if (-not $process.WaitForExit(60000)) {
              try {
                Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              } catch {
              }
              Show-SmokeDiagnostics
              throw "Frozen app startup smoke test timed out after 60 seconds"
            }

            $exitCode = $process.ExitCode
            if ($exitCode -ne 0) {
              Show-SmokeDiagnostics
              throw "Frozen app startup smoke test failed with exit code $exitCode"
            }
          } finally {
            Remove-Item Env:\SCENE_RIPPER_STARTUP_SMOKE_TEST -ErrorAction SilentlyContinue
            Remove-Item Env:\LOCALAPPDATA -ErrorAction SilentlyContinue
          }

      - name: Upload smoke test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: SceneRipper-Windows-SmokeTest-Diagnostics
          path: smoke-test-artifacts
          if-no-files-found: ignore

      - name: Build Inno Setup installer
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: iscc packaging/windows/scene_ripper.iss

      - name: Verify installer output
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "packaging/windows/Output" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer was not created"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SceneRipper-Windows-Installer
          path: packaging/windows/Output/*.exe

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: SceneRipper-Windows-App
          path: dist/Scene Ripper

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="v${APP_VERSION}"
          fi

          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes ""

          gh release upload "${RELEASE_TAG}" packaging/windows/Output/*.exe --clobber

      - name: Sign update archive
        id: sign_archive
        if: env.UPDATE_PRIVATE_ED_KEY != ''
        shell: pwsh
        env:
          UPDATE_PRIVATE_ED_KEY: ${{ secrets.UPDATE_PRIVATE_ED_KEY }}
        run: |
          $installer = Get-ChildItem -Path "packaging/windows/Output" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Installer not found for signing"
          }

          $winSparkleTool = Get-ChildItem -Path "packaging/runtime/winsparkle/windows/tools" -Recurse -Filter "winsparkle-tool.exe" | Select-Object -First 1
          if (-not $winSparkleTool) {
            throw "winsparkle-tool.exe not found in staged runtime"
          }

          $privateKeyFile = Join-Path $env:RUNNER_TEMP "eddsa_private.key"
          Set-Content -Path $privateKeyFile -Value $env:UPDATE_PRIVATE_ED_KEY -NoNewline

          $signatureOutput = & $winSparkleTool.FullName sign --private-key-file $privateKeyFile $installer.FullName
          Write-Host $signatureOutput

          $signatureMatch = [regex]::Match($signatureOutput, 'sparkle:edSignature="([^"]+)"')
          if (-not $signatureMatch.Success) {
            throw "Missing sparkle:edSignature in winsparkle-tool output"
          }

          "signature=$($signatureMatch.Groups[1].Value)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate update feed artifact
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          UPDATE_FEED_TAG: ${{ env.UPDATE_FEED_TAG }}
          SIGNATURE: ${{ steps.sign_archive.outputs.signature }}
        run: |
          INSTALLER_NAME="SceneRipper-Setup-${APP_VERSION}.exe"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="v${APP_VERSION}"
          fi

          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${INSTALLER_NAME}"
          NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${UPDATE_FEED_TAG}/release-notes-windows.html"
          ASSET_SIZE="$(python - <<'PY'
          from pathlib import Path
          print(next(Path("packaging/windows/Output").glob("*.exe")).stat().st_size)
          PY
          )"
          FEED_DIR="dist/update-feed/windows"

          APPCAST_ARGS=(
            --platform windows
            --version "${APP_VERSION}"
            --build-version "${APP_VERSION}"
            --release-tag "${RELEASE_TAG}"
            --release-url "${RELEASE_URL}"
            --enclosure-url "${ASSET_URL}"
            --enclosure-length "${ASSET_SIZE}"
            --notes-url "${NOTES_URL}"
            --output "${FEED_DIR}/appcast-windows.xml"
            --notes-output "${FEED_DIR}/release-notes-windows.html"
          )
          if [ -n "$SIGNATURE" ]; then
            APPCAST_ARGS+=(--signature "$SIGNATURE")
          fi
          python packaging/release/generate_appcast.py "${APPCAST_ARGS[@]}"

          VERIFY_ARGS=("${FEED_DIR}/appcast-windows.xml")
          if [ -n "$SIGNATURE" ]; then
            VERIFY_ARGS+=(--require-signature)
          fi
          python packaging/release/verify_update_feed.py "${VERIFY_ARGS[@]}"

      - name: Publish update feed release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATE_FEED_TAG: ${{ env.UPDATE_FEED_TAG }}
        run: |
          gh release view "${UPDATE_FEED_TAG}" >/dev/null 2>&1 || \
            gh release create "${UPDATE_FEED_TAG}" --title "Update Feed" --notes ""

          gh release upload "${UPDATE_FEED_TAG}" \
            dist/update-feed/windows/appcast-windows.xml \
            dist/update-feed/windows/release-notes-windows.html \
            --clobber

      - name: Upload update feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: SceneRipper-Windows-Appcast
          path: dist/update-feed/windows
          if-no-files-found: error
