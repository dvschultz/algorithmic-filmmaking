name: macOS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the .app bundle'
        required: false
        default: '0.2.4'

env:
  PYTHON_VERSION: '3.11'
  SPARKLE_VERSION: '2.8.1'
  UPDATE_FEED_TAG: 'update-feed'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS .app
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version || '0.2.4' }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Install system dependencies
        run: brew install mpv create-dmg

      - name: Stage FFmpeg runtime
        run: |
          python - <<'PY'
          import shutil
          import tempfile
          import urllib.request
          import zipfile
          from pathlib import Path

          runtime_dir = Path("packaging/runtime/ffmpeg/macos")
          shutil.rmtree(runtime_dir, ignore_errors=True)
          runtime_dir.mkdir(parents=True, exist_ok=True)

          downloads = {
              "ffmpeg": "https://www.osxexperts.net/ffmpeg7arm.zip",
              "ffprobe": "https://www.osxexperts.net/ffprobe7arm.zip",
          }

          with tempfile.TemporaryDirectory() as temp_dir:
              temp_path = Path(temp_dir)
              for binary_name, url in downloads.items():
                  archive_path = temp_path / f"{binary_name}.zip"
                  urllib.request.urlretrieve(url, archive_path)
                  with zipfile.ZipFile(archive_path, "r") as archive:
                      members = [name for name in archive.namelist() if name.endswith(binary_name)]
                      if not members:
                          raise SystemExit(f"{binary_name} not found in downloaded archive")
                      member = members[0]
                      extracted = Path(archive.extract(member, temp_path))
                      target_path = runtime_dir / binary_name
                      shutil.move(str(extracted), target_path)
                      target_path.chmod(0o755)
          PY

      - name: Stage Sparkle runtime
        env:
          SPARKLE_VERSION: ${{ env.SPARKLE_VERSION }}
        run: |
          python - <<'PY'
          import os
          import shutil
          import tarfile
          import tempfile
          import urllib.request
          import zipfile
          from pathlib import Path

          version = os.environ["SPARKLE_VERSION"]
          output_dir = Path("packaging/runtime/sparkle/macos")
          shutil.rmtree(output_dir, ignore_errors=True)
          output_dir.mkdir(parents=True, exist_ok=True)
          asset_name = f"Sparkle-{version}.tar.xz"
          asset_url = f"https://github.com/sparkle-project/Sparkle/releases/download/{version}/{asset_name}"

          with tempfile.TemporaryDirectory() as temp_dir:
              temp_path = Path(temp_dir)
              archive_path = temp_path / asset_name
              urllib.request.urlretrieve(asset_url, archive_path)

              extract_dir = temp_path / "extract"
              extract_dir.mkdir()
              if archive_path.suffix == ".zip":
                  with zipfile.ZipFile(archive_path) as archive:
                      archive.extractall(extract_dir)
              else:
                  with tarfile.open(archive_path, "r:*") as archive:
                      archive.extractall(extract_dir)

              copied_any = False
              for candidate_name in ("Sparkle.framework", "sparkle.app", "bin"):
                  for source in extract_dir.rglob(candidate_name):
                      destination = output_dir / candidate_name
                      if destination.exists():
                          continue
                      if source.is_dir():
                          shutil.copytree(source, destination)
                      else:
                          destination.parent.mkdir(parents=True, exist_ok=True)
                          shutil.copy2(source, destination)
                      copied_any = True
                      break

              sparkle_cli = next(output_dir.rglob("sparkle"), None)
              sign_tool = next(output_dir.rglob("sign_update"), None)
              if not copied_any or sparkle_cli is None or sign_tool is None:
                  raise SystemExit("Failed to stage Sparkle runtime with sparkle and sign_update tools")
          PY

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt
          pip install \
            'torch>=2.4,<2.7' \
            'torchaudio>=2.4,<2.7' \
            'torchvision>=0.19,<0.22' \
            'transformers>=4.50,<5' \
            'huggingface-hub>=0.34.0,<1.0' \
            'sentencepiece>=0.2.0,<1.0' \
            'protobuf>=4.25,<6' \
            'einops>=0.7.0,<1.0' \
            'ultralytics>=8.4.0,<9' \
            'insightface>=0.7.3,<1.0' \
            'onnxruntime>=1.16.0,<2.0' \
            'librosa>=0.10.0,<1.0' \
            'demucs-infer>=4.1.0,<5' \
            'mlx-vlm>=0.1.0,<1.0' \
            'paddleocr>=3.0.0,<4' \
            'paddlepaddle>=3.3.0,<4' \
            'rapidfuzz>=3.0.0'
          # lightning-whisper-mlx must be --no-deps to avoid tiktoken conflict with litellm
          pip install 'lightning-whisper-mlx>=0.0.10,<1.0' --no-deps
          pip install pyinstaller cryptography

      - name: Resolve updater signing metadata
        env:
          UPDATE_FEED_URL: https://github.com/${{ github.repository }}/releases/download/${{ env.UPDATE_FEED_TAG }}/appcast-macos.xml
          UPDATE_PUBLIC_ED_KEY: ${{ secrets.UPDATE_PUBLIC_ED_KEY }}
          UPDATE_PRIVATE_ED_KEY: ${{ secrets.UPDATE_PRIVATE_ED_KEY }}
        run: |
          python - <<'PY'
          import importlib.util
          import os
          from pathlib import Path

          spec = importlib.util.spec_from_file_location(
              "scene_ripper_build_support",
              Path("packaging/build_support.py"),
          )
          build_support = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(build_support)

          feed_url = os.environ.get("UPDATE_FEED_URL", "").strip()
          explicit_public = os.environ.get("UPDATE_PUBLIC_ED_KEY", "").strip()
          private_key = os.environ.get("UPDATE_PRIVATE_ED_KEY", "").strip()
          resolved_public = build_support.resolve_update_public_ed_key(
              explicit_public,
              private_key,
          )
          updater_enabled = bool(feed_url and resolved_public and private_key)

          print(f"macos_feed_url_present={bool(feed_url)}")
          print(f"macos_public_key_present={bool(explicit_public)}")
          print(f"macos_private_key_present={bool(private_key)}")
          print(f"macos_resolved_public_key_present={bool(resolved_public)}")
          print(f"macos_updater_enabled={updater_enabled}")

          if not updater_enabled:
              print(
                  "::warning::macOS native updater disabled for this build because "
                  "release signing metadata is incomplete."
              )

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(
                  f"RESOLVED_UPDATE_FEED_URL={feed_url if updater_enabled else ''}\n"
              )
              fh.write(
                  f"RESOLVED_UPDATE_PUBLIC_ED_KEY={resolved_public if updater_enabled else ''}\n"
              )
              fh.write(f"UPDATER_ENABLED={'true' if updater_enabled else 'false'}\n")
          PY

      - name: Stage bundled model runtime
        env:
          SCENE_RIPPER_MODEL_RUNTIME_DIR: packaging/runtime/models/macos
        run: |
          python packaging/macos/stage_models.py

      - name: Run PyInstaller
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_BUILD_VERSION: ${{ steps.version.outputs.version }}
          SPARKLE_FEED_URL: ${{ env.RESOLVED_UPDATE_FEED_URL }}
          SPARKLE_PUBLIC_ED_KEY: ${{ env.RESOLVED_UPDATE_PUBLIC_ED_KEY }}
          UPDATE_PRIVATE_ED_KEY: ${{ secrets.UPDATE_PRIVATE_ED_KEY }}
        run: |
          pyinstaller packaging/macos/scene_ripper.spec \
            --distpath dist \
            --workpath build \
            --noconfirm

      - name: Verify .app bundle
        run: |
          APP_PATH="dist/Scene Ripper.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app bundle not found"
            exit 1
          fi
          if ! find "$APP_PATH" -name "ffmpeg" | grep -q .; then
            echo "ERROR: bundled ffmpeg binary not found"
            exit 1
          fi
          if ! find "$APP_PATH" -name "ffprobe" | grep -q .; then
            echo "ERROR: bundled ffprobe binary not found"
            exit 1
          fi
          if ! find "$APP_PATH" -name "libmpv*.dylib" | grep -q .; then
            echo "ERROR: bundled libmpv dylib not found"
            exit 1
          fi
          if ! find "$APP_PATH" \( -name "sparkle" -o -name "Sparkle.framework" \) | grep -q .; then
            echo "ERROR: bundled Sparkle runtime not found"
            exit 1
          fi
          du -sh "$APP_PATH"
          ls -la "$APP_PATH/Contents/"

      - name: Smoke test frozen app startup
        run: |
          SMOKE_DIR="$(pwd)/smoke-test-artifacts"
          mkdir -p "$SMOKE_DIR"

          APP_BIN="dist/Scene Ripper.app/Contents/MacOS/Scene Ripper"
          SMOKE_LOG_DIR="$SMOKE_DIR/logs"
          mkdir -p "$SMOKE_LOG_DIR"
          APP_LOG="$HOME/Library/Logs/Scene Ripper/scene-ripper.log"
          STDOUT_LOG="$SMOKE_DIR/stdout.log"
          STDERR_LOG="$SMOKE_DIR/stderr.log"
          SUCCESS_MARKER="Startup smoke test completed successfully"

          # Clear any previous app log
          rm -f "$APP_LOG"

          SCENE_RIPPER_STARTUP_SMOKE_TEST=1 \
            "$APP_BIN" > "$STDOUT_LOG" 2> "$STDERR_LOG" &
          PID=$!

          show_diagnostics() {
            echo "=== stdout ==="
            tail -200 "$STDOUT_LOG" 2>/dev/null || true
            echo "=== stderr ==="
            tail -200 "$STDERR_LOG" 2>/dev/null || true
            echo "=== app log ==="
            tail -300 "$APP_LOG" 2>/dev/null || echo "(no app log found)"
          }

          DEADLINE=$((SECONDS + 60))
          while [ $SECONDS -lt $DEADLINE ]; do
            if grep -q "$SUCCESS_MARKER" "$APP_LOG" "$STDERR_LOG" "$STDOUT_LOG" 2>/dev/null; then
              kill $PID 2>/dev/null || true
              wait $PID 2>/dev/null || true
              echo "Startup smoke test passed"
              exit 0
            fi
            if ! kill -0 $PID 2>/dev/null; then
              wait $PID 2>/dev/null
              EXIT_CODE=$?
              show_diagnostics
              echo "ERROR: App exited with code $EXIT_CODE before reporting success"
              exit 1
            fi
            sleep 1
          done

          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          show_diagnostics
          echo "ERROR: Startup smoke test timed out after 60 seconds"
          exit 1

      - name: Run frozen runtime validation suite
        run: |
          APP_BIN="dist/Scene Ripper.app/Contents/MacOS/Scene Ripper"

          run_smoke_target() {
            local TARGET="$1"
            local TIMEOUT="${2:-60}"
            echo "--- Running runtime smoke target: $TARGET ---"

            local TARGET_DIR="$(pwd)/runtime-validation-artifacts/$TARGET"
            mkdir -p "$TARGET_DIR"
            local APP_LOG="$HOME/Library/Logs/Scene Ripper/scene-ripper.log"
            local STDOUT_LOG="$TARGET_DIR/stdout.log"
            local STDERR_LOG="$TARGET_DIR/stderr.log"
            local SUCCESS_MARKER="Runtime smoke test '$TARGET' completed successfully"

            rm -f "$APP_LOG"

            SCENE_RIPPER_RUNTIME_SMOKE_TEST_TARGET="$TARGET" \
              "$APP_BIN" > "$STDOUT_LOG" 2> "$STDERR_LOG" &
            local PID=$!

            local DEADLINE=$((SECONDS + TIMEOUT))
            while [ $SECONDS -lt $DEADLINE ]; do
              if grep -q "$SUCCESS_MARKER" "$APP_LOG" "$STDERR_LOG" "$STDOUT_LOG" 2>/dev/null; then
                # Wait for clean exit
                if ! wait $PID 2>/dev/null; then
                  local EXIT_CODE=$?
                  if [ $EXIT_CODE -ne 0 ] 2>/dev/null; then
                    echo "WARNING: Target '$TARGET' reported success but exited with code $EXIT_CODE"
                  fi
                fi
                echo "Runtime smoke target '$TARGET' passed"
                return 0
              fi
              if ! kill -0 $PID 2>/dev/null; then
                wait $PID 2>/dev/null
                local EXIT_CODE=$?
                # Check one more time after exit
                if grep -q "$SUCCESS_MARKER" "$APP_LOG" "$STDERR_LOG" "$STDOUT_LOG" 2>/dev/null; then
                  echo "Runtime smoke target '$TARGET' passed"
                  return 0
                fi
                echo "=== stdout ===" && tail -200 "$STDOUT_LOG" 2>/dev/null || true
                echo "=== stderr ===" && tail -200 "$STDERR_LOG" 2>/dev/null || true
                echo "=== app log ===" && tail -300 "$APP_LOG" 2>/dev/null || true
                echo "ERROR: Target '$TARGET' exited with code $EXIT_CODE before reporting success"
                return 1
              fi
              sleep 1
            done

            kill $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
            echo "=== stdout ===" && tail -200 "$STDOUT_LOG" 2>/dev/null || true
            echo "=== stderr ===" && tail -200 "$STDERR_LOG" 2>/dev/null || true
            echo "=== app log ===" && tail -300 "$APP_LOG" 2>/dev/null || true
            echo "ERROR: Target '$TARGET' timed out after $TIMEOUT seconds"
            return 1
          }

          run_smoke_target "imports"
          run_smoke_target "project"
          run_smoke_target "scene-detect"

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Fix framework structures for signing
        if: env.CODESIGN_IDENTITY != ''
        run: |
          APP_PATH="dist/Scene Ripper.app"
          FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"

          fix_framework() {
            local fw="$1"
            local fwname
            fwname=$(basename "$fw" .framework)

            [ -d "$fw/Versions" ] || return 0

            echo "Fixing $fwname.framework..."
            local ver_dir
            ver_dir=$(find "$fw/Versions" -mindepth 1 -maxdepth 1 -type d ! -name "Current" | head -1)
            if [ -z "$ver_dir" ]; then
              echo "  No version directory found, skipping"
              return 0
            fi
            local ver_name
            ver_name=$(basename "$ver_dir")

            rm -f "$fw/Versions/Current"
            ln -s "$ver_name" "$fw/Versions/Current"

            while IFS= read -r entry; do
              local entry_name
              entry_name=$(basename "$entry")
              local root_entry="$fw/$entry_name"

              rm -rf "$root_entry"
              ln -s "Versions/Current/$entry_name" "$root_entry"
            done < <(find "$ver_dir" -mindepth 1 -maxdepth 1 ! -name "_CodeSignature" | sort)
          }

          fix_framework "$FRAMEWORKS_DIR/Python.framework"
          fix_framework "$FRAMEWORKS_DIR/Sparkle.framework"
          for fw in "$FRAMEWORKS_DIR"/PySide6/Qt/lib/*.framework; do
            [ -d "$fw" ] || continue
            fix_framework "$fw"
          done

      - name: Code sign .app
        if: env.CODESIGN_IDENTITY != ''
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          APP_PATH="dist/Scene Ripper.app"
          ENTITLEMENTS="packaging/macos/entitlements.plist"
          FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"

          sign_item() {
            local target="$1"
            shift || true

            if [ ! -e "$target" ]; then
              return 0
            fi

            echo "Signing $target"
            codesign --force --timestamp --options runtime --sign "$CODESIGN_IDENTITY" "$@" "$target"
          }

          # Sign standalone loadable modules and dylibs first.
          while IFS= read -r binary; do
            sign_item "$binary"
          done < <(find "$APP_PATH" -type f \( -name "*.so" -o -name "*.dylib" \) | sort)

          # Sign bundled helper executables before the enclosing app.
          while IFS= read -r helper_binary; do
            sign_item "$helper_binary"
          done < <(find "$APP_PATH" -type f \( -name "ffmpeg" -o -name "ffprobe" \) | sort)

          # Sparkle embeds nested XPCs and helper apps that must be signed before the framework.
          if [ -d "$FRAMEWORKS_DIR/Sparkle.framework" ]; then
            while IFS= read -r nested_binary; do
              sign_item "$nested_binary"
            done < <(
              find "$FRAMEWORKS_DIR/Sparkle.framework" -type f \
                \( -path "*/Contents/MacOS/*" -o -path "*/XPCServices/*.xpc/Contents/MacOS/*" \) | sort
            )

            while IFS= read -r nested_bundle; do
              sign_item "$nested_bundle"
            done < <(
              find "$FRAMEWORKS_DIR/Sparkle.framework" -depth \
                \( -name "*.xpc" -o -name "*.app" \) -type d | sort
            )
          fi

          # Sign framework Mach-O binaries before signing the enclosing framework bundles.
          while IFS= read -r framework_binary; do
            sign_item "$framework_binary"
          done < <(
            find "$FRAMEWORKS_DIR" -type f \( \
              -path "*/Python.framework/Versions/*/Python" -o \
              -path "*/Python.framework/Versions/*/*.dylib" -o \
              -path "*/Sparkle.framework/Versions/*/Sparkle" -o \
              -path "*/Sparkle.framework/Versions/*/Autoupdate" -o \
              -path "*/PySide6/Qt/lib/*.framework/Versions/*/*" \
            \) | sort
          )

          while IFS= read -r framework; do
            sign_item "$framework"
          done < <(find "$FRAMEWORKS_DIR" -depth -type d -name "*.framework" | sort)

          sign_item "$APP_PATH/Contents/MacOS/Scene Ripper" --entitlements "$ENTITLEMENTS"
          sign_item "$APP_PATH" --entitlements "$ENTITLEMENTS"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo "Signing complete"

      - name: Create DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_NAME="Scene-Ripper-${APP_VERSION}-arm64.dmg"
          create-dmg \
            --volname "Scene Ripper" \
            --volicon "assets/icon.icns" \
            --background "assets/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "Scene Ripper.app" 180 200 \
            --app-drop-link 480 200 \
            --no-internet-enable \
            "dist/${DMG_NAME}" \
            "dist/Scene Ripper.app" \
          || true

          if [ ! -f "dist/${DMG_NAME}" ]; then
            echo "ERROR: DMG not created"
            exit 1
          fi

      - name: Notarize DMG
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_NAME="Scene-Ripper-${APP_VERSION}-arm64.dmg"
          RESULT_JSON="$(mktemp)"
          xcrun notarytool store-credentials "AC_PASSWORD" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

          set +e
          xcrun notarytool submit "dist/${DMG_NAME}" \
            --keychain-profile "AC_PASSWORD" \
            --wait \
            --output-format json > "$RESULT_JSON"
          SUBMIT_EXIT_CODE=$?
          set -e

          SUBMISSION_ID="$(RESULT_JSON_PATH="$RESULT_JSON" python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["RESULT_JSON_PATH"])
          if not path.exists() or path.stat().st_size == 0:
              print("")
              raise SystemExit(0)

          try:
              data = json.loads(path.read_text(encoding="utf-8"))
          except json.JSONDecodeError:
              print("")
              raise SystemExit(0)

          print(data.get("id", ""))
          PY
          )"
          STATUS="$(RESULT_JSON_PATH="$RESULT_JSON" python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["RESULT_JSON_PATH"])
          if not path.exists() or path.stat().st_size == 0:
              print("")
              raise SystemExit(0)

          try:
              data = json.loads(path.read_text(encoding="utf-8"))
          except json.JSONDecodeError:
              print("")
              raise SystemExit(0)

          print(data.get("status", ""))
          PY
          )"

          if [ -n "$SUBMISSION_ID" ] && [ "$STATUS" != "Accepted" ]; then
            echo "Apple notarization failed with status: ${STATUS:-unknown}"
            echo "Fetching notarization log for submission ${SUBMISSION_ID}..."
            xcrun notarytool log "$SUBMISSION_ID" --keychain-profile "AC_PASSWORD" || true
          fi

          if [ "$SUBMIT_EXIT_CODE" -ne 0 ] || [ "$STATUS" != "Accepted" ]; then
            echo "ERROR: Apple notarization did not succeed"
            exit 1
          fi

          xcrun stapler staple "dist/${DMG_NAME}"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scene-Ripper-macOS-app
          path: dist/Scene Ripper.app
          if-no-files-found: error

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scene-Ripper-macOS-DMG
          path: dist/Scene-Ripper-*.dmg
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_NAME="Scene-Ripper-${APP_VERSION}-arm64.dmg"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="v${APP_VERSION}"
          fi

          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes ""

          gh release upload "${RELEASE_TAG}" "dist/${DMG_NAME}" --clobber

      - name: Sign update archive
        id: sign_archive
        if: env.UPDATER_ENABLED == 'true'
        env:
          UPDATE_PRIVATE_ED_KEY: ${{ secrets.UPDATE_PRIVATE_ED_KEY }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_PATH="dist/Scene-Ripper-${APP_VERSION}-arm64.dmg"
          SIGN_TOOL="$(find packaging/runtime/sparkle/macos -type f -name sign_update | head -1)"
          if [ -z "$SIGN_TOOL" ]; then
            echo "ERROR: sign_update tool not found in staged Sparkle runtime"
            exit 1
          fi

          SIGNATURE_OUTPUT="$(printf '%s' "$UPDATE_PRIVATE_ED_KEY" | "$SIGN_TOOL" --ed-key-file - "$DMG_PATH")"
          echo "$SIGNATURE_OUTPUT"

          SIGNATURE="$(SIGNATURE_OUTPUT="$SIGNATURE_OUTPUT" python - <<'PY'
          import os
          import re

          text = os.environ["SIGNATURE_OUTPUT"]
          match = re.search(r'sparkle:edSignature="([^"]+)"', text)
          if match is None:
              raise SystemExit("Missing sparkle:edSignature in sign_update output")
          print(match.group(1))
          PY
          )"
          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"

      - name: Generate update feed artifact
        if: env.UPDATER_ENABLED == 'true'
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          UPDATE_FEED_TAG: ${{ env.UPDATE_FEED_TAG }}
          SIGNATURE: ${{ steps.sign_archive.outputs.signature }}
        run: |
          DMG_NAME="Scene-Ripper-${APP_VERSION}-arm64.dmg"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="v${APP_VERSION}"
          fi

          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${DMG_NAME}"
          NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${UPDATE_FEED_TAG}/release-notes-macos.html"
          ASSET_SIZE="$(stat -f%z "dist/${DMG_NAME}")"
          FEED_DIR="dist/update-feed/macos"

          APPCAST_ARGS=(
            --platform macos
            --version "${APP_VERSION}"
            --build-version "${APP_VERSION}"
            --release-tag "${RELEASE_TAG}"
            --release-url "${RELEASE_URL}"
            --enclosure-url "${ASSET_URL}"
            --enclosure-length "${ASSET_SIZE}"
            --minimum-system-version "13.0"
            --notes-url "${NOTES_URL}"
            --output "${FEED_DIR}/appcast-macos.xml"
            --notes-output "${FEED_DIR}/release-notes-macos.html"
          )
          if [ -n "$SIGNATURE" ]; then
            APPCAST_ARGS+=(--signature "$SIGNATURE")
          fi
          python packaging/release/generate_appcast.py "${APPCAST_ARGS[@]}"

          VERIFY_ARGS=("${FEED_DIR}/appcast-macos.xml")
          if [ -n "$SIGNATURE" ]; then
            VERIFY_ARGS+=(--require-signature)
          fi
          python packaging/release/verify_update_feed.py "${VERIFY_ARGS[@]}"

      - name: Publish update feed release assets
        if: env.UPDATER_ENABLED == 'true' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATE_FEED_TAG: ${{ env.UPDATE_FEED_TAG }}
        run: |
          gh release view "${UPDATE_FEED_TAG}" >/dev/null 2>&1 || \
            gh release create "${UPDATE_FEED_TAG}" --title "Update Feed" --notes ""

          gh release upload "${UPDATE_FEED_TAG}" \
            dist/update-feed/macos/appcast-macos.xml \
            dist/update-feed/macos/release-notes-macos.html \
            --clobber

      - name: Upload update feed artifact
        if: env.UPDATER_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Scene-Ripper-macOS-Appcast
          path: dist/update-feed/macos
          if-no-files-found: error

      - name: Upload smoke test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Scene-Ripper-macOS-smoke-logs
          path: |
            smoke-test-artifacts/
            runtime-validation-artifacts/
            ~/Library/Logs/Scene Ripper/
          if-no-files-found: ignore

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
